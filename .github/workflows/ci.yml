name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    uses: agentjido/github-actions/.github/workflows/elixir-lint.yml@main
    with:
      lint_command: mix format --check-formatted && mix compile --warnings-as-errors && mix credo --strict && mix dialyzer --format raw --ignore-exit-status

  test:
    name: Test
    uses: agentjido/github-actions/.github/workflows/elixir-test.yml@main
    with:
      otp_versions: '["27", "28"]'
      elixir_versions: '["1.18", "1.19"]'
      test_command: mix test --cover

  benchmark:
    name: Benchmarks
    uses: agentjido/github-actions/.github/workflows/elixir-test.yml@main
    with:
      otp_versions: '["28"]'
      elixir_versions: '["1.19"]'
      test_command: MIX_ENV=dev mix unified_ui.bench --quick
