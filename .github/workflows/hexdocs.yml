name: Publish HexDocs

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hexdocs:
    name: Publish docs to HexDocs
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Publish docs
        run: mix hex.publish docs --yes
